name: Revalidate Blog Posts

on:
  schedule:
    # Run daily at 6:30 AM UTC (adjust timezone if needed)
    - cron: '30 6 * * *'
  # Allow manual trigger for testing
  workflow_dispatch:

jobs:
  revalidate:
    runs-on: ubuntu-latest

    steps:
      - name: Check CRON_SECRET
        run: |
          if [ -z "${{ secrets.CRON_SECRET }}" ]; then
            echo "ERROR: GitHub Actions secret CRON_SECRET is not configured."
            exit 1
          fi
          echo "CRON_SECRET is configured."

      - name: Revalidate blog posts
        run: |
          curl -v -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
               https://resumebuildz.tech/api/cron/revalidate-blog